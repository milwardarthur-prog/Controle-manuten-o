<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Equipamentos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Painel de Equipamentos</h1>

  <div class="resumo">
    <div>🟢 Disponíveis: <span id="cont-disponivel">0</span></div>
    <div>🔴 Manutenção: <span id="cont-manutencao">0</span></div>
    <div>🔵 Locados: <span id="cont-locado">0</span></div>
    <div>⚪ Total: <span id="cont-total">0</span></div>
  </div>

  <div class="filtros">
    <button class="btn-filtro ativo" onclick="filtrar('todos', this)">Todos</button>
    <button class="btn-filtro" onclick="filtrar('disponivel', this)">🟢 Disponíveis</button>
    <button class="btn-filtro" onclick="filtrar('locado', this)">🔵 Locados</button>
    <button class="btn-filtro" onclick="filtrar('manutencao', this)">🔴 Manutenção</button>
  </div>

  <div id="painel" class="painel"></div>

  <script src="script.js"></script>
</body>
</html>
