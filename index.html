<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Equipamentos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- CARD TAXA DE OCUPAÇÃO - TOPO ESQUERDO -->
  <div class="card card-ocupacao" id="card-ocupacao">
    <div class="card-titulo">Taxa de Ocupação</div>
    <div class="ocupacao-valor" id="taxa-ocupacao">--%</div>
  </div>

  <!-- DATA DE ATUALIZAÇÃO - TOPO DIREITO -->
  <div class="atualizacao-topo" id="info-atualizacao">Carregando dados...</div>

  <h1>Painel de Equipamentos</h1>

  <!-- BOTÕES DE FILTRO -->
  <div class="resumo">
    <button class="btn-filtro" id="btn-total"      onclick="aplicarFiltro('total')">⚪ Total: <span id="cont-total">0</span></button>
    <button class="btn-filtro" id="btn-disponivel" onclick="aplicarFiltro('disponivel')">🟢 Disponíveis: <span id="cont-disponivel">0</span></button>
    <button class="btn-filtro" id="btn-manutencao" onclick="aplicarFiltro('manutencao')">🔴 Manutenção: <span id="cont-manutencao">0</span></button>
    <button class="btn-filtro" id="btn-locado"     onclick="aplicarFiltro('locado')">🔵 Locados: <span id="cont-locado">0</span></button>
  </div>

  <div id="painel" class="painel"></div>

  <script src="script.js"></script>
</body>
</html>
