<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Equipamentos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="no-print">
    <h1>Painel de Equipamentos</h1>

    <div class="resumo">
      <div class="resumo-card ativo" onclick="filtrarStatus('todos', this)">⚪ Total: <span id="cont-total">0</span></div>
      <div class="resumo-card" onclick="filtrarStatus('disponivel', this)">🟢 Disponíveis: <span id="cont-disponivel">0</span></div>
      <div class="resumo-card" onclick="filtrarStatus('manutencao', this)">🔴 Manutenção: <span id="cont-manutencao">0</span></div>
      <div class="resumo-card" onclick="filtrarStatus('locado', this)">🔵 Locados: <span id="cont-locado">0</span></div>
    </div>

    <div style="text-align:center; margin-bottom: 20px;">
      <button onclick="gerarRelatorio()" class="btn-print">🖨️ Gerar Relatório Impresso</button>
    </div>

    <div class="filtros-kva">
      <button class="btn-kva ativo" onclick="filtrarKva('todos', this)">Todos</button>
      <button class="btn-kva" onclick="filtrarKva('10-39', this)">10 – 39 kVA</button>
      <button class="btn-kva" onclick="filtrarKva('40-65', this)">40 – 65 kVA</button>
      <button class="btn-kva" onclick="filtrarKva('70-90', this)">70 – 90 kVA</button>
      <button class="btn-kva" onclick="filtrarKva('100-130', this)">100 – 130 kVA</button>
      <button class="btn-kva" onclick="filtrarKva('140-160', this)">140 – 160 kVA</button>
      <button class="btn-kva" onclick="filtrarKva('170-190', this)">170 – 190 kVA</button>
      <button class="btn-kva" onclick="filtrarKva('200-290', this)">200 – 290 kVA</button>
      <button class="btn-kva" onclick="filtrarKva('300-600', this)">300 – 600 kVA</button>
      <button class="btn-kva" onclick="filtrarKva('outros', this)">Outros</button>
    </div>

    <div id="painel" class="painel"></div>
  </div>

  <!-- ESTA ÁREA SÓ APARECE NA IMPRESSÃO -->
  <div id="relatorio-impressao" class="only-print">
    <div class="header-relatorio">
      <h2>Relatório de Status de Equipamentos</h2>
      <p id="data-relatorio"></p>
    </div>
    <div id="conteudo-relatorio"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
