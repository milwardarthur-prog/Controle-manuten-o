<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Equipamentos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="topo">
    <h1>Painel de Equipamentos</h1>

    <div class="resumo">
      <table>
        <tr>
          <th>Disponíveis</th>
          <th>Manutenção</th>
          <th>Locados</th>
          <th>Total</th>
        </tr>
        <tr>
          <td id="cont-disponivel">0</td>
          <td id="cont-manutencao">0</td>
          <td id="cont-locado">0</td>
          <td id="cont-total">0</td>
        </tr>
      </table>
    </div>
  </div>

  <div id="painel" class="painel"></div>

  <script src="script.js"></script>
</body>
</html>
