<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Equipamentos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Painel de Equipamentos</h1>

  <div class="resumo">
    <div class="resumo-card ativo" onclick="filtrar('todos', this)">⚪ Total: <span id="cont-total">0</span></div>
    <div class="resumo-card" onclick="filtrar('disponivel', this)">🟢 Disponíveis: <span id="cont-disponivel">0</span></div>
    <div class="resumo-card" onclick="filtrar('manutencao', this)">🔴 Manutenção: <span id="cont-manutencao">0</span></div>
    <div class="resumo-card" onclick="filtrar('locado', this)">🔵 Locados: <span id="cont-locado">0</span></div>
  </div>

  <!-- As categorias serão geradas aqui dentro pelo JS -->
  <div id="categorias-container"></div>

  <script src="script.js"></script>
</body>
</html>
