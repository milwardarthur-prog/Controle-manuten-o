<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Equipamentos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- CARD TAXA DE OCUPAÇÃO - TOPO ESQUERDO -->
  <div class="card card-ocupacao" id="card-ocupacao">
    <div class="card-titulo">Taxa de Ocupação</div>
    <div class="ocupacao-valor" id="taxa-ocupacao">--%</div>
  </div>

  <!-- DATA DE ATUALIZAÇÃO - TOPO DIREITO -->
  <div class="atualizacao-topo" id="info-atualizacao">Carregando dados...</div>

  <h1>Painel de Equipamentos</h1>

  <div class="resumo">
    <div class="resumo-card">🟢 Disponíveis: <span id="cont-disponivel">0</span></div>
    <div class="resumo-card">🔴 Manutenção: <span id="cont-manutencao">0</span></div>
    <div class="resumo-card">🔵 Locados: <span id="cont-locado">0</span></div>
    <div class="resumo-card">⚪ Total: <span id="cont-total">0</span></div>
  </div>

  <div id="painel" class="painel"></div>

  <script src="script.js"></script>
</body>
</html>
